# ============================================================
# Orchestrator — Multi-Paradigm / Multi-Language CI Pipeline
# ============================================================
# Detects which languages are present in the repository and
# triggers the appropriate per-language workflows.  The matrix
# strategy means every language is built and tested in parallel.
#
# Supported languages & paradigms:
#   Python      — OOP · Functional · Scripting
#   JavaScript  — Functional · OOP · Event-driven
#   TypeScript  — Typed Functional · OOP
#   Go          — Procedural · Concurrent
#   Java        — OOP · Functional (Streams/Lambdas)
#   Rust        — Systems · Functional
#   C / C++     — Procedural · OOP
# ============================================================

name: CI Orchestrator

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ----------------------------------------------------------
  # 1. Detect which languages exist in this repository
  # ----------------------------------------------------------
  detect-languages:
    name: Detect Languages
    runs-on: ubuntu-latest
    outputs:
      has_python:     ${{ steps.detect.outputs.has_python }}
      has_javascript: ${{ steps.detect.outputs.has_javascript }}
      has_typescript: ${{ steps.detect.outputs.has_typescript }}
      has_go:         ${{ steps.detect.outputs.has_go }}
      has_java:       ${{ steps.detect.outputs.has_java }}
      has_rust:       ${{ steps.detect.outputs.has_rust }}
      has_cpp:        ${{ steps.detect.outputs.has_cpp }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect languages
        id: detect
        run: |
          has_python=false
          has_javascript=false
          has_typescript=false
          has_go=false
          has_java=false
          has_rust=false
          has_cpp=false

          # Python
          if find . -name "*.py" -not -path "./.git/*" | grep -q .; then
            has_python=true
          fi
          if [ -f "requirements.txt" ] || [ -f "pyproject.toml" ] || [ -f "setup.py" ]; then
            has_python=true
          fi

          # JavaScript
          if find . -name "*.js" -not -path "./.git/*" -not -path "./node_modules/*" | grep -q .; then
            has_javascript=true
          fi
          if [ -f "package.json" ]; then
            has_javascript=true
          fi

          # TypeScript
          if find . -name "*.ts" -not -path "./.git/*" -not -path "./node_modules/*" | grep -q .; then
            has_typescript=true
          fi
          if [ -f "tsconfig.json" ]; then
            has_typescript=true
          fi

          # Go
          if find . -name "*.go" -not -path "./.git/*" | grep -q .; then
            has_go=true
          fi
          if [ -f "go.mod" ]; then
            has_go=true
          fi

          # Java
          if find . -name "*.java" -not -path "./.git/*" | grep -q .; then
            has_java=true
          fi
          if [ -f "pom.xml" ] || [ -f "build.gradle" ] || [ -f "build.gradle.kts" ]; then
            has_java=true
          fi

          # Rust
          if find . -name "*.rs" -not -path "./.git/*" | grep -q .; then
            has_rust=true
          fi
          if [ -f "Cargo.toml" ]; then
            has_rust=true
          fi

          # C / C++
          if find . \( -name "*.c" -o -name "*.cpp" -o -name "*.cc" -o -name "*.cxx" \) \
               -not -path "./.git/*" | grep -q .; then
            has_cpp=true
          fi
          if [ -f "CMakeLists.txt" ] || [ -f "Makefile" ]; then
            has_cpp=true
          fi

          echo "has_python=$has_python"         >> "$GITHUB_OUTPUT"
          echo "has_javascript=$has_javascript" >> "$GITHUB_OUTPUT"
          echo "has_typescript=$has_typescript" >> "$GITHUB_OUTPUT"
          echo "has_go=$has_go"                 >> "$GITHUB_OUTPUT"
          echo "has_java=$has_java"             >> "$GITHUB_OUTPUT"
          echo "has_rust=$has_rust"             >> "$GITHUB_OUTPUT"
          echo "has_cpp=$has_cpp"               >> "$GITHUB_OUTPUT"

          echo "=== Detection results ==="
          echo "Python:     $has_python"
          echo "JavaScript: $has_javascript"
          echo "TypeScript: $has_typescript"
          echo "Go:         $has_go"
          echo "Java:       $has_java"
          echo "Rust:       $has_rust"
          echo "C/C++:      $has_cpp"

  # ----------------------------------------------------------
  # 2. Call per-language workflows (conditioned on detection)
  # ----------------------------------------------------------
  python:
    name: Python CI
    needs: detect-languages
    if: needs.detect-languages.outputs.has_python == 'true'
    uses: ./.github/workflows/python-ci.yml

  javascript:
    name: JavaScript CI
    needs: detect-languages
    if: >-
      needs.detect-languages.outputs.has_javascript == 'true' ||
      needs.detect-languages.outputs.has_typescript == 'true'
    uses: ./.github/workflows/javascript-ci.yml

  go:
    name: Go CI
    needs: detect-languages
    if: needs.detect-languages.outputs.has_go == 'true'
    uses: ./.github/workflows/go-ci.yml

  java:
    name: Java CI
    needs: detect-languages
    if: needs.detect-languages.outputs.has_java == 'true'
    uses: ./.github/workflows/java-ci.yml

  rust:
    name: Rust CI
    needs: detect-languages
    if: needs.detect-languages.outputs.has_rust == 'true'
    uses: ./.github/workflows/rust-ci.yml

  cpp:
    name: C/C++ CI
    needs: detect-languages
    if: needs.detect-languages.outputs.has_cpp == 'true'
    uses: ./.github/workflows/cpp-ci.yml

  # ----------------------------------------------------------
  # 3. Aggregate status — single required check for branch protection
  # ----------------------------------------------------------
  all-checks:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [detect-languages, python, javascript, go, java, rust, cpp]
    if: always()
    steps:
      - name: Evaluate results
        run: |
          results=()
          results+=("${{ needs.python.result }}")
          results+=("${{ needs.javascript.result }}")
          results+=("${{ needs.go.result }}")
          results+=("${{ needs.java.result }}")
          results+=("${{ needs.rust.result }}")
          results+=("${{ needs.cpp.result }}")

          for r in "${results[@]}"; do
            if [[ "$r" == "failure" || "$r" == "cancelled" ]]; then
              echo "One or more language CI jobs failed: $r"
              exit 1
            fi
          done
          echo "All applicable CI checks passed."
