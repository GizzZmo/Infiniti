# ============================================================
# Go CI — Procedural · Concurrent Paradigms
# ============================================================
# Builds, vets, and tests Go modules across multiple versions.
# Concurrent paradigm support is validated via race-detector
# tests (`-race` flag).
# ============================================================

name: Go CI

on:
  workflow_call:
  push:
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/go-ci.yml"
  pull_request:
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/go-ci.yml"

permissions:
  contents: read

jobs:
  lint:
    name: Lint (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: go vet
        run: go vet ./...

      - name: staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./... || echo "staticcheck warnings found"
        continue-on-error: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m
        continue-on-error: true

  test:
    name: Test (Go ${{ matrix.go-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        go-version: ["1.21", "1.22", "stable"]
        os: [ubuntu-latest, windows-latest, macos-latest]
        exclude:
          - os: windows-latest
            go-version: "1.21"
          - os: macos-latest
            go-version: "1.21"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build ./...

      - name: Test (with race detector — concurrent paradigm)
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.go-version == 'stable'
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: coverage.out
          if-no-files-found: ignore

  benchmark:
    name: Benchmarks (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Run benchmarks
        run: |
          if go test -bench=. -benchmem -run='^$' ./... 2>&1 | grep -q "Benchmark"; then
            go test -bench=. -benchmem -run='^$' ./...
          else
            echo "No benchmark functions found."
          fi
        continue-on-error: true
