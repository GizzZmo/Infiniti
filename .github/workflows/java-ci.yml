# ============================================================
# Java CI — OOP · Functional (Streams / Lambdas) Paradigms
# ============================================================
# Supports Maven and Gradle build systems across multiple JDK
# versions (LTS line).  Functional paradigm coverage includes
# stream-based tests and lambda-heavy code paths.
# ============================================================

name: Java CI

on:
  workflow_call:
  push:
    paths:
      - "**.java"
      - "pom.xml"
      - "build.gradle"
      - "build.gradle.kts"
      - "settings.gradle"
      - "settings.gradle.kts"
      - "gradle/**"
      - ".github/workflows/java-ci.yml"
  pull_request:
    paths:
      - "**.java"
      - "pom.xml"
      - "build.gradle"
      - "build.gradle.kts"
      - "settings.gradle"
      - "settings.gradle.kts"
      - "gradle/**"
      - ".github/workflows/java-ci.yml"

permissions:
  contents: read

jobs:
  detect-build-tool:
    name: Detect Build Tool
    runs-on: ubuntu-latest
    outputs:
      tool: ${{ steps.detect.outputs.tool }}
    steps:
      - uses: actions/checkout@v4
      - name: Detect Maven or Gradle
        id: detect
        run: |
          if [ -f "pom.xml" ]; then
            echo "tool=maven" >> "$GITHUB_OUTPUT"
          elif [ -f "build.gradle" ] || [ -f "build.gradle.kts" ]; then
            echo "tool=gradle" >> "$GITHUB_OUTPUT"
          else
            echo "tool=none" >> "$GITHUB_OUTPUT"
          fi

  build-maven:
    name: Build & Test — Maven (JDK ${{ matrix.java-version }})
    runs-on: ${{ matrix.os }}
    needs: detect-build-tool
    if: needs.detect-build-tool.outputs.tool == 'maven'
    strategy:
      fail-fast: false
      matrix:
        java-version: ["17", "21", "23"]
        os: [ubuntu-latest, windows-latest, macos-latest]
        exclude:
          - os: windows-latest
            java-version: "17"
          - os: macos-latest
            java-version: "17"

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java-version }}
          distribution: temurin
          cache: maven

      - name: Build and test with Maven
        run: mvn -B verify --no-transfer-progress

      - name: Upload Surefire reports
        if: always() && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-jdk${{ matrix.java-version }}
          path: "**/target/surefire-reports/*.xml"
          if-no-files-found: ignore

  build-gradle:
    name: Build & Test — Gradle (JDK ${{ matrix.java-version }})
    runs-on: ${{ matrix.os }}
    needs: detect-build-tool
    if: needs.detect-build-tool.outputs.tool == 'gradle'
    strategy:
      fail-fast: false
      matrix:
        java-version: ["17", "21", "23"]
        os: [ubuntu-latest, windows-latest, macos-latest]
        exclude:
          - os: windows-latest
            java-version: "17"
          - os: macos-latest
            java-version: "17"

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java-version }}
          distribution: temurin
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x gradlew 2>/dev/null || true
        shell: bash

      - name: Build and test with Gradle
        run: ./gradlew build --no-daemon
        shell: bash

      - name: Upload test results
        if: always() && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: gradle-test-results-jdk${{ matrix.java-version }}
          path: "**/build/test-results/**/*.xml"
          if-no-files-found: ignore

  checkstyle:
    name: Checkstyle (Java)
    runs-on: ubuntu-latest
    needs: detect-build-tool
    if: needs.detect-build-tool.outputs.tool == 'maven'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Run Checkstyle
        run: mvn -B checkstyle:check --no-transfer-progress || echo "Checkstyle issues found or plugin not configured"
        continue-on-error: true
