# ============================================================
# JavaScript / TypeScript CI — Functional · OOP · Event-driven
# ============================================================
# Supports both plain JS and TypeScript projects.
# Uses Node.js LTS matrix, auto-detects package manager
# (npm / yarn / pnpm), and runs lint + build + test.
# ============================================================

name: JavaScript / TypeScript CI

on:
  workflow_call:
  push:
    paths:
      - "**.js"
      - "**.ts"
      - "**.jsx"
      - "**.tsx"
      - "package.json"
      - "package-lock.json"
      - "yarn.lock"
      - "pnpm-lock.yaml"
      - "tsconfig*.json"
      - ".eslintrc*"
      - ".eslintignore"
      - ".prettierrc*"
      - ".github/workflows/javascript-ci.yml"
  pull_request:
    paths:
      - "**.js"
      - "**.ts"
      - "**.jsx"
      - "**.tsx"
      - "package.json"
      - "package-lock.json"
      - "yarn.lock"
      - "pnpm-lock.yaml"
      - "tsconfig*.json"
      - ".eslintrc*"
      - ".eslintignore"
      - ".prettierrc*"
      - ".github/workflows/javascript-ci.yml"

permissions:
  contents: read

jobs:
  detect-package-manager:
    name: Detect Package Manager
    runs-on: ubuntu-latest
    outputs:
      manager: ${{ steps.detect.outputs.manager }}
      install_cmd: ${{ steps.detect.outputs.install_cmd }}
      run_cmd: ${{ steps.detect.outputs.run_cmd }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect package manager
        id: detect
        run: |
          if [ -f "pnpm-lock.yaml" ]; then
            echo "manager=pnpm"       >> "$GITHUB_OUTPUT"
            echo "install_cmd=pnpm install --frozen-lockfile" >> "$GITHUB_OUTPUT"
            echo "run_cmd=pnpm run"   >> "$GITHUB_OUTPUT"
          elif [ -f "yarn.lock" ]; then
            echo "manager=yarn"       >> "$GITHUB_OUTPUT"
            echo "install_cmd=yarn install --frozen-lockfile" >> "$GITHUB_OUTPUT"
            echo "run_cmd=yarn"       >> "$GITHUB_OUTPUT"
          else
            echo "manager=npm"        >> "$GITHUB_OUTPUT"
            echo "install_cmd=npm ci" >> "$GITHUB_OUTPUT"
            echo "run_cmd=npm run"    >> "$GITHUB_OUTPUT"
          fi

  lint:
    name: Lint (JS/TS)
    runs-on: ubuntu-latest
    needs: detect-package-manager
    if: hashFiles('package.json') != ''
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: ${{ needs.detect-package-manager.outputs.manager }}

      - name: Setup pnpm
        if: needs.detect-package-manager.outputs.manager == 'pnpm'
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: ${{ needs.detect-package-manager.outputs.install_cmd }}

      - name: ESLint
        run: |
          RUN_CMD="${{ needs.detect-package-manager.outputs.run_cmd }}"
          if $RUN_CMD lint --if-present 2>/dev/null; then
            echo "ESLint passed."
          else
            echo "No lint script found or ESLint not configured."
          fi
        continue-on-error: true

      - name: Prettier check
        run: |
          if [ -f ".prettierrc" ] || [ -f ".prettierrc.js" ] || [ -f ".prettierrc.json" ] || \
             [ -f "prettier.config.js" ]; then
            npx prettier --check "**/*.{js,ts,jsx,tsx,json,md}" || true
          else
            echo "Prettier not configured, skipping."
          fi
        continue-on-error: true

  build-and-test:
    name: Build & Test (Node ${{ matrix.node-version }})
    runs-on: ${{ matrix.os }}
    needs: detect-package-manager
    if: hashFiles('package.json') != ''
    strategy:
      fail-fast: false
      matrix:
        node-version: ["18.x", "20.x", "22.x"]
        os: [ubuntu-latest, windows-latest, macos-latest]
        exclude:
          - os: windows-latest
            node-version: "18.x"
          - os: macos-latest
            node-version: "18.x"

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        if: needs.detect-package-manager.outputs.manager == 'pnpm'
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: ${{ needs.detect-package-manager.outputs.manager }}

      - name: Install dependencies
        run: ${{ needs.detect-package-manager.outputs.install_cmd }}

      - name: TypeScript compile check
        run: |
          if [ -f "tsconfig.json" ]; then
            npx tsc --noEmit || echo "TypeScript compilation warnings/errors."
          else
            echo "No tsconfig.json found, skipping TypeScript check."
          fi
        shell: bash
        continue-on-error: true

      - name: Build
        run: |
          ${{ needs.detect-package-manager.outputs.run_cmd }} build --if-present || \
            echo "No build script found."
        shell: bash
        continue-on-error: true

      - name: Test
        run: |
          ${{ needs.detect-package-manager.outputs.run_cmd }} test --if-present || \
            echo "No test script found."
        shell: bash

      - name: Upload build artifacts
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == '20.x'
        uses: actions/upload-artifact@v4
        with:
          name: js-build
          path: |
            dist/
            build/
            out/
          if-no-files-found: ignore

  # ------------------------------------------------------------------
  # No package.json fallback — raw JS/TS files with Node
  # ------------------------------------------------------------------
  raw-scripts:
    name: Raw JS/TS Scripts
    runs-on: ubuntu-latest
    needs: detect-package-manager
    if: hashFiles('package.json') == ''
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Run JS files
        run: |
          mapfile -t js_files < <(find . -name "*.js" -not -path "./.git/*" | head -20)
          if [ ${#js_files[@]} -gt 0 ]; then
            for f in "${js_files[@]}"; do
              echo "Running $f"
              node "$f" || true
            done
          else
            echo "No .js files found."
          fi

      - name: Run TS files (via ts-node)
        run: |
          mapfile -t ts_files < <(find . -name "*.ts" -not -path "./.git/*" | head -20)
          if [ ${#ts_files[@]} -gt 0 ]; then
            npm install -g ts-node typescript @types/node 2>/dev/null
            for f in "${ts_files[@]}"; do
              echo "Running $f"
              ts-node "$f" || true
            done
          else
            echo "No .ts files found."
          fi
